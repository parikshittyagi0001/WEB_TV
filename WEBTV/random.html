<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Movie Card Hover Effect</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .movie-card {
            position: relative;
            width: 300px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }

        .movie-card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .details {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            box-sizing: border-box;
            color: #fff;
            transform: translateY(100%);
            transition: transform 0.3s ease-in-out;
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .movie-card:hover .details {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="movie-card" onmouseover="showDetails(this)" onmouseout="hideDetails(this)">
        <img src="./public/page-4.png" alt="Movie Poster">
        <div class="details">
            <h3>Title</h3>
            <p>Genre</p>
            <p>Year</p>
        </div>
    </div>

    <script>
        function showDetails(card) {
            card.querySelector('.details').style.transform = 'translateY(0)';
        }

        function hideDetails(card) {
            card.querySelector('.details').style.transform = 'translateY(100%)';
        }
    </script>
</body>

</html>
